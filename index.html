<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>اختبار الحروف التفاعلي | قيس أحمد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #f0f4ff 0%, #e6edf7 100%);
            min-height: 100vh;
            padding: 1rem;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        button {
            transition: transform 0.1s ease;
        }
        button:active {
            transform: scale(0.97);
        }
        .details-grid, .error-only-grid {
            transition: all 0.3s ease;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
        }
        .details-grid.open, .error-only-grid.open {
            max-height: 800px;
            opacity: 1;
            margin-top: 1rem;
        }
        /* خطوط احترافية */
        .font-cairo {
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }
        .font-amiri {
            font-family: 'Amiri', 'Times New Roman', serif;
        }
        .font-noto {
            font-family: 'Noto Naskh Arabic', 'Scheherazade New', serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&display=swap');
        
        /* حجم الحرف كبير وواضح */
        .letter-big {
            font-size: 13rem;
            line-height: 1.2;
        }
        @media (max-width: 640px) {
            .letter-big {
                font-size: 9rem;
            }
        }
        @media (max-width: 480px) {
            .letter-big {
                font-size: 7rem;
            }
        }
        /* تنسيق منطقة الاختبار بحيث الأزرار في الأسفل */
        .game-container {
            display: flex;
            flex-direction: column;
            min-height: 80vh;
        }
        .letter-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .buttons-area {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .action-row {
            display: flex;
            gap: 1rem;
            justify-content: stretch;
        }
        .action-row button {
            flex: 1;
        }
    </style>
</head>
<body class="font-amiri"> <!-- الافتراضي الآن أميري -->
    <div id="app" class="max-w-2xl mx-auto">
        <!-- الشاشة الرئيسية مع خيارات الخط -->
        <div id="start-screen" class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-6 border border-white/40">
            <div class="text-center mb-4">
                <h1 class="text-3xl font-extrabold bg-gradient-to-l from-indigo-700 to-sky-600 bg-clip-text text-transparent">✍️ اختبار الحروف التفاعلي</h1>
                <p class="text-sm text-gray-500 mt-2">المعلّم: <span class="font-bold text-indigo-600">أسامة إبراهيم</span></p>
                <div class="mt-3 inline-block bg-amber-100 text-amber-800 px-4 py-1 rounded-full text-sm font-semibold">🎓 الطالب: قيس أحمد</div>
            </div>
            
            <!-- اختيار نوع الخط بشكل احترافي -->
            <div class="mt-4 bg-gray-50 p-3 rounded-xl">
                <label class="block text-sm font-bold text-gray-700 mb-2">📝 نوع الخط:</label>
                <div class="flex flex-wrap gap-3 justify-center">
                    <button onclick="changeFont('cairo')" class="font-cairo px-4 py-2 rounded-xl bg-white text-indigo-800 text-sm font-semibold shadow-sm hover:bg-indigo-100 transition border">كايرو</button>
                    <button onclick="changeFont('amiri')" class="font-amiri px-4 py-2 rounded-xl bg-indigo-100 text-indigo-800 text-sm font-semibold shadow-sm hover:bg-indigo-200 transition border border-indigo-300">أميري (افتراضي)</button>
                    <button onclick="changeFont('noto')" class="font-noto px-4 py-2 rounded-xl bg-white text-emerald-800 text-sm font-semibold shadow-sm hover:bg-emerald-100 transition border">نسخ</button>
                </div>
            </div>
            
            <div class="flex flex-col gap-4 mt-6">
                <button onclick="startFullTest()" class="bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl text-xl font-bold shadow-lg flex items-center justify-center gap-3">
                    🚀 بدء اختبار جديد (كامل)
                </button>
                <button onclick="showReport()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl text-xl font-bold shadow-lg flex items-center justify-center gap-3">
                    📊 عرض التقرير
                </button>
            </div>
            <p class="text-center text-xs text-gray-400 mt-6">✨ أسئلة تشمل جميع أشكال الحروف (أول، وسط، آخر)</p>
        </div>

        <!-- منطقة الاختبار مع الأزرار في الأسفل -->
        <div id="game-zone" class="hidden bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl p-5 border border-white/40 game-container">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold text-indigo-700 bg-indigo-50 px-4 py-1 rounded-full text-sm">قيس أحمد</span>
                <span id="counter" class="text-gray-500 text-sm bg-gray-100 px-3 py-1 rounded-full"></span>
            </div>
            
            <!-- منطقة الحرف تأخذ مساحة كبيرة -->
            <div class="letter-area">
                <div class="text-center">
                    <div class="text-sm font-medium text-gray-500 mb-2">الشكل الحالي:</div>
                    <div id="letter-display" class="letter-big font-black py-4 mb-2 bg-gradient-to-b from-gray-50 to-gray-100 rounded-3xl border border-gray-200 shadow-inner flex items-center justify-center h-48">—</div>
                </div>
            </div>
            
            <!-- الأزرار في الأسفل مع مسافة -->
            <div class="buttons-area">
                <div class="action-row">
                    <button onclick="saveResult(false)" class="bg-red-500 active:bg-red-700 text-white py-5 rounded-2xl text-xl font-bold shadow-lg flex items-center justify-center gap-2">❌ خطأ</button>
                    <button onclick="saveResult(true)" class="bg-green-500 active:bg-green-700 text-white py-5 rounded-2xl text-xl font-bold shadow-lg flex items-center justify-center gap-2">✅ صح</button>
                </div>
                <button onclick="cancelTest()" class="w-full bg-gray-200 text-gray-700 py-3 rounded-xl text-sm font-medium active:bg-gray-300">↩️ إنهاء الاختبار والعودة</button>
            </div>
        </div>

        <!-- منطقة التقرير -->
        <div id="report-zone" class="hidden bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl p-5 border border-white/40">
            <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                <h2 class="text-xl font-bold text-gray-800">📋 تقرير الطالب: قيس أحمد</h2>
                <div class="text-xs text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full">أ. أسامة إبراهيم</div>
            </div>
            <div id="report-content" class="text-sm space-y-4 max-h-[550px] overflow-y-auto pb-2"></div>
            <div class="mt-6 flex gap-3">
                <button onclick="startFullTest()" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold shadow">🔄 اختبار كامل جديد</button>
                <button onclick="backToMainMenu()" class="flex-1 bg-gray-400 text-white py-3 rounded-xl font-bold shadow">🏠 الرئيسية</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- بيانات الحروف ----------
        const alphabet = [
            {base:"أ", d:{"أول":"أ","آخر":"ـأ"}},
            {base:"ب", d:{"أول":"بـ","وسط":"ـبـ","آخر":"ـب"}},
            {base:"ت", d:{"أول":"تـ","وسط":"ـتـ","آخر":"ـت"}},
            {base:"ث", d:{"أول":"ثـ","وسط":"ـثـ","آخر":"ـث"}},
            {base:"ج", d:{"أول":"جـ","وسط":"ـجـ","آخر":"ـج"}},
            {base:"ح", d:{"أول":"حـ","وسط":"ـحـ","آخر":"ـح"}},
            {base:"خ", d:{"أول":"خـ","وسط":"ـخـ","آخر":"ـخ"}},
            {base:"د", d:{"أول":"د","آخر":"ـد"}},
            {base:"ذ", d:{"أول":"ذ","آخر":"ـذ"}},
            {base:"ر", d:{"أول":"ر","آخر":"ـر"}},
            {base:"ز", d:{"أول":"ز","آخر":"ـز"}},
            {base:"س", d:{"أول":"سـ","وسط":"ـسـ","آخر":"ـس"}},
            {base:"ش", d:{"أول":"شـ","وسط":"ـشـ","آخر":"ـش"}},
            {base:"ص", d:{"أول":"صـ","وسط":"ـصـ","آخر":"ـص"}},
            {base:"ض", d:{"أول":"ضـ","وسط":"ـضـ","آخر":"ـض"}},
            {base:"ط", d:{"أول":"طـ","وسط":"ـطـ","آخر":"ـط"}},
            {base:"ظ", d:{"أول":"ظـ","وسط":"ـظـ","آخر":"ـظ"}},
            {base:"ع", d:{"أول":"عـ","وسط":"ـعـ","آخر":"ـع"}},
            {base:"غ", d:{"أول":"غـ","وسط":"ـغـ","آخر":"ـغ"}},
            {base:"ف", d:{"أول":"فـ","وسط":"ـفـ","آخر":"ـف"}},
            {base:"ق", d:{"أول":"قـ","وسط":"ـقـ","آخر":"ـق"}},
            {base:"ك", d:{"أول":"كـ","وسط":"ـكـ","آخر":"ـك"}},
            {base:"ل", d:{"أول":"لـ","وسط":"ـلـ","آخر":"ـل"}},
            {base:"م", d:{"أول":"مـ","وسط":"ـمـ","آخر":"ـم"}},
            {base:"ن", d:{"أول":"نـ","وسط":"ـنـ","آخر":"ـن"}},
            {base:"ه", d:{"أول":"هـ","وسط":"ـهـ","آخر":"ـه"}},
            {base:"و", d:{"أول":"و","آخر":"ـو"}},
            {base:"ي", d:{"أول":"يـ","وسط":"ـيـ","آخر":"ـي"}}
        ];
        const STUDENT_NAME = "قيس أحمد";
        
        // متغيرات الاختبار
        let currentTestQueue = [];
        let currentTestIndex = 0;
        let currentTestResults = null;
        
        // ---------- إدارة الخط ----------
        function changeFont(fontType) {
            const body = document.body;
            body.classList.remove('font-cairo', 'font-amiri', 'font-noto');
            if (fontType === 'cairo') {
                body.classList.add('font-cairo');
            } else if (fontType === 'amiri') {
                body.classList.add('font-amiri');
            } else if (fontType === 'noto') {
                body.classList.add('font-noto');
            }
            localStorage.setItem('selectedFont', fontType);
        }
        
        function loadSavedFont() {
            const saved = localStorage.getItem('selectedFont');
            if (saved === 'cairo') changeFont('cairo');
            else if (saved === 'noto') changeFont('noto');
            else changeFont('amiri'); // الافتراضي أميري
        }
        
        // ---------- التخزين ----------
        function getData() {
            let data = localStorage.getItem('qais_letters_pro');
            return data ? JSON.parse(data) : {};
        }
        function saveData(obj) {
            localStorage.setItem('qais_letters_pro', JSON.stringify(obj));
        }
        function initStudent() {
            let db = getData();
            if (!db[STUDENT_NAME]) db[STUDENT_NAME] = [];
            saveData(db);
        }
        
        // ---------- بناء اختبار ----------
        function buildQueueFromBases(bases) {
            let queue = [];
            for (let letter of alphabet) {
                if (bases.includes(letter.base)) {
                    for (let pos in letter.d) {
                        queue.push({ char: letter.d[pos], base: letter.base, pos: pos });
                    }
                }
            }
            queue.sort(() => Math.random() - 0.5);
            return queue;
        }
        
        function startTestWithOptions(customBases = null) {
            if (customBases && customBases.length) {
                currentTestQueue = buildQueueFromBases(customBases);
            } else {
                currentTestQueue = [];
                for (let letter of alphabet) {
                    for (let pos in letter.d) {
                        currentTestQueue.push({ char: letter.d[pos], base: letter.base, pos: pos });
                    }
                }
                currentTestQueue.sort(() => Math.random() - 0.5);
            }
            currentTestIndex = 0;
            currentTestResults = {};
            for (let letter of alphabet) {
                let posObj = {};
                for (let p in letter.d) posObj[p] = "-";
                currentTestResults[letter.base] = posObj;
            }
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('report-zone').classList.add('hidden');
            document.getElementById('game-zone').classList.remove('hidden');
            nextLetter();
        }
        
        function startFullTest() {
            startTestWithOptions(null);
        }
        
        function startMistakesTestFromRecord(recordIndex) {
            let db = getData();
            let records = db[STUDENT_NAME] || [];
            if (!records[recordIndex]) {
                alert("حدث خطأ في استرجاع المحاولة");
                return;
            }
            let record = records[recordIndex];
            let resObj;
            try { resObj = JSON.parse(record.results); } catch(e) { resObj = {}; }
            let mistakeBases = [];
            for (let letter of alphabet) {
                let base = letter.base;
                if (resObj[base]) {
                    let hasError = false;
                    for (let pos in letter.d) {
                        if (resObj[base][pos] === "❌") { hasError = true; break; }
                    }
                    if (hasError) mistakeBases.push(base);
                }
            }
            if (mistakeBases.length === 0) {
                alert("🎉 ممتاز! لا توجد أخطاء في هذه المحاولة.");
                return;
            }
            startTestWithOptions(mistakeBases);
        }
        
        function nextLetter() {
            if (currentTestIndex >= currentTestQueue.length) {
                finishTestAndSave();
                return;
            }
            let item = currentTestQueue[currentTestIndex];
            document.getElementById('letter-display').innerText = item.char;
            document.getElementById('counter').innerText = `${currentTestIndex+1} / ${currentTestQueue.length}`;
        }
        
        function saveResult(isCorrect) {
            if (currentTestIndex >= currentTestQueue.length) return;
            let item = currentTestQueue[currentTestIndex];
            currentTestResults[item.base][item.pos] = isCorrect ? "✅" : "❌";
            currentTestIndex++;
            nextLetter();
        }
        
        function finishTestAndSave() {
            let db = getData();
            if (!db[STUDENT_NAME]) db[STUDENT_NAME] = [];
            let total = currentTestQueue.length;
            let correct = 0;
            for (let base in currentTestResults) {
                for (let pos in currentTestResults[base]) {
                    if (currentTestResults[base][pos] === "✅") correct++;
                }
            }
            let percent = Math.round((correct / total) * 100);
            let record = {
                date: new Date().toLocaleDateString('ar-EG'),
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                results: JSON.stringify(currentTestResults),
                summary: { correct, total, percent }
            };
            db[STUDENT_NAME].push(record);
            saveData(db);
            showReport();
        }
        
        function cancelTest() {
            if (confirm("هل تريد إنهاء الاختبار بدون حفظ؟")) backToMainMenu();
        }
        
        // ---------- عرض التقرير ----------
        function buildGrid(resObj, onlyErrors) {
            let html = '';
            for (let letter of alphabet) {
                let base = letter.base;
                let posKeys = Object.keys(letter.d);
                let first = resObj[base]?.["أول"] || "-";
                let middle = resObj[base]?.["وسط"] || "-";
                let last = resObj[base]?.["آخر"] || "-";
                if (onlyErrors) {
                    let hasErr = (first === "❌" || middle === "❌" || last === "❌");
                    if (!hasErr) continue;
                }
                const fmt = (icon) => {
                    if (icon === "✅") return '<span class="text-green-600 text-sm font-bold">✅</span>';
                    if (icon === "❌") return '<span class="text-red-500 text-sm font-bold">❌</span>';
                    return '<span class="text-gray-300 text-xs">◌</span>';
                };
                html += `
                    <div class="flex flex-col items-center bg-white p-1.5 rounded-lg shadow-sm border">
                        <span class="font-bold text-lg text-indigo-800">${base}</span>
                        <div class="flex gap-1 mt-1">
                            ${posKeys.includes("أول") ? `<div class="flex flex-col items-center"><span class="text-[9px] text-gray-400">أول</span>${fmt(first)}</div>` : ''}
                            ${posKeys.includes("وسط") ? `<div class="flex flex-col items-center"><span class="text-[9px] text-gray-400">وسط</span>${fmt(middle)}</div>` : ''}
                            ${posKeys.includes("آخر") ? `<div class="flex flex-col items-center"><span class="text-[9px] text-gray-400">آخر</span>${fmt(last)}</div>` : ''}
                        </div>
                    </div>
                `;
            }
            if (onlyErrors && html === "") html = '<div class="col-span-full text-center text-gray-400 py-6">✨ لا توجد أخطاء ✨</div>';
            return html;
        }
        
        function togglePanel(panelId) {
            let panel = document.getElementById(panelId);
            if (!panel) return;
            panel.classList.toggle('open');
            let btn = panel.previousElementSibling;
            if (btn && btn.classList.contains('toggle-btn')) {
                let svg = btn.querySelector('svg');
                if (svg) svg.style.transform = panel.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        }
        
        function showReport() {
            let db = getData();
            let records = db[STUDENT_NAME] || [];
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-zone').classList.add('hidden');
            document.getElementById('report-zone').classList.remove('hidden');
            if (!records.length) {
                document.getElementById('report-content').innerHTML = `<div class="text-center py-16 bg-gray-50 rounded-2xl">📭 لا توجد محاولات سابقة<br><button onclick="startFullTest()" class="mt-4 bg-emerald-500 text-white px-5 py-2 rounded-xl">ابدأ أول اختبار</button></div>`;
                return;
            }
            let reversed = [...records].reverse();
            let html = '';
            for (let i = 0; i < reversed.length; i++) {
                let rec = reversed[i];
                let originalIndex = records.length - 1 - i;
                let resObj = JSON.parse(rec.results);
                let summary = rec.summary;
                let percent = summary.percent;
                let gradient = percent >= 70 ? 'from-green-100 to-emerald-50' : (percent >= 40 ? 'from-amber-50 to-yellow-50' : 'from-red-50 to-rose-50');
                let detailsId = `details-${originalIndex}`;
                let errorsId = `errors-${originalIndex}`;
                let fullGrid = buildGrid(resObj, false);
                let errGrid = buildGrid(resObj, true);
                html += `
                    <div class="report-card bg-gradient-to-br ${gradient} rounded-2xl p-4 border shadow-md">
                        <div class="flex justify-between flex-wrap gap-2 border-b pb-2 mb-2">
                            <div class="flex gap-2">
                                <span class="bg-white/60 rounded-full px-3 py-1 text-xs font-bold">📅 ${rec.date}</span>
                                <span class="bg-white/50 rounded-full px-2 py-1 text-[10px]">🕒 ${rec.time}</span>
                            </div>
                            <div class="flex gap-2">
                                <div class="bg-white/80 rounded-xl px-3 py-1">✅ ${summary.correct}/${summary.total}</div>
                                <div class="bg-indigo-100 font-bold rounded-xl px-3 py-1">${percent}%</div>
                                <button onclick="deleteRecord(${originalIndex})" class="bg-red-100 text-red-500 rounded-full w-8 h-8 text-sm">🗑️</button>
                            </div>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2 mb-3"><div class="bg-gradient-to-l from-indigo-500 to-emerald-500 h-2 rounded-full" style="width:${percent}%"></div></div>
                        <div class="flex flex-wrap gap-2 mt-1">
                            <button onclick="togglePanel('${detailsId}')" class="toggle-btn flex-1 flex justify-center gap-1 bg-indigo-50 text-indigo-700 py-2 rounded-xl text-sm">
                                📖 عرض كل الحروف <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <button onclick="togglePanel('${errorsId}')" class="toggle-btn flex-1 flex justify-center gap-1 bg-red-50 text-red-700 py-2 rounded-xl text-sm">
                                ❌ عرض الأخطاء فقط <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <button onclick="startMistakesTestFromRecord(${originalIndex})" class="flex-1 bg-amber-500 text-white py-2 rounded-xl text-sm font-semibold">
                                🔄 اختبار الأخطاء
                            </button>
                        </div>
                        <div id="${detailsId}" class="details-grid"><div class="border-t pt-3 mt-2"><div class="grid grid-cols-4 sm:grid-cols-6 gap-2 max-h-64 overflow-y-auto p-1 bg-white/40 rounded-xl">${fullGrid}</div></div></div>
                        <div id="${errorsId}" class="error-only-grid"><div class="border-t pt-3 mt-2"><div class="grid grid-cols-4 sm:grid-cols-6 gap-2 max-h-64 overflow-y-auto p-1 bg-red-50/40 rounded-xl">${errGrid}</div></div></div>
                    </div>
                `;
            }
            document.getElementById('report-content').innerHTML = html;
        }
        
        function deleteRecord(index) {
            if (confirm("حذف هذه المحاولة؟")) {
                let db = getData();
                db[STUDENT_NAME].splice(index, 1);
                saveData(db);
                showReport();
            }
        }
        
        function backToMainMenu() {
            document.getElementById('game-zone').classList.add('hidden');
            document.getElementById('report-zone').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
        
        // ربط الدوال العامة
        window.startFullTest = startFullTest;
        window.startMistakesTestFromRecord = startMistakesTestFromRecord;
        window.saveResult = saveResult;
        window.showReport = showReport;
        window.deleteRecord = deleteRecord;
        window.cancelTest = cancelTest;
        window.backToMainMenu = backToMainMenu;
        window.togglePanel = togglePanel;
        window.changeFont = changeFont;
        
        // التهيئة
        initStudent();
        loadSavedFont();
    </script>
</body>
</html>
